name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
  repository_dispatch:
    types: [release]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

permissions:
  contents: write

jobs:
  # ─── Build native bindings for all platforms ───
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install
        working-directory: tachyon-napi

      - name: Build native module (release)
        run: bun napi build --platform --release --target ${{ matrix.target }}
        working-directory: tachyon-napi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binding-${{ matrix.target }}
          path: tachyon-napi/*.node
          if-no-files-found: error

  # ─── Run tests before publishing ───
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-${{ matrix.target }}

      - name: Run tests
        run: cargo test --workspace

  # ─── Publish to npm ───
  publish:
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install
        working-directory: tachyon-napi

      - name: Create npm platform directories
        run: bun napi create-npm-dirs
        working-directory: tachyon-napi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: tachyon-napi/artifacts

      - name: Move artifacts
        run: bun run artifacts
        working-directory: tachyon-napi

      - name: List packages
        run: ls -R npm
        working-directory: tachyon-napi

      - name: Publish @tachyon-rs/server
        run: |
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
          npm publish --access public
        working-directory: tachyon-napi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Resolve workspace dependency for tachyon-rs
        run: |
          VERSION=$(jq -r '.version' tachyon-napi/package.json)
          jq --arg v "$VERSION" '.dependencies["@tachyon-rs/server"] = $v' tachyon-library/package.json > tmp.json
          mv tmp.json tachyon-library/package.json

      - name: Build tachyon-rs library
        run: bun install && bun run build
        working-directory: tachyon-library

      - name: Publish tachyon-rs (public library)
        run: npm publish --access public
        working-directory: tachyon-library
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── GitHub Release with auto changelog ───
  github-release:
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" != v* ]]; then
            TAG=$(git describe --tags --abbrev=0)
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --no-exec
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package artifacts
        run: |
          mkdir -p release
          for dir in artifacts/binding-*/; do
            target=$(basename "$dir" | sed 's/binding-//')
            for f in "$dir"*.node; do
              [ -f "$f" ] && cp "$f" "release/tachyon-napi.${target}.node"
            done
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          body_path: CHANGES.md
          files: release/*
